<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Perro</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            margin: 0;
        }
        
        .dog-calculator {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 300px;
            text-align: center;
        }
        
        .dog-face {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .dog-name {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .display {
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            font-size: 32px;
            margin-bottom: 20px;
            text-align: right;
            word-wrap: break-word;
            min-height: 40px;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .number {
            background: #e8f4f8;
            color: #333;
        }
        
        .number:hover {
            background: #d0e8f0;
        }
        
        .operator {
            background: #ffb347;
            color: white;
        }
        
        .operator:hover {
            background: #ff9500;
        }
        
        .equals {
            background: #90EE90;
            color: white;
            grid-column: span 2;
        }
        
        .equals:hover {
            background: #7dd67d;
        }
        
        .clear {
            background: #ff6b6b;
            color: white;
            grid-column: span 2;
        }
        
        .clear:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="dog-calculator">
        <div class="dog-face">🐕</div>
        <div class="dog-name">Calculadora Rex</div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">−</button>
            
            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendNumber('.')">.</button>
            
            <button class="number" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentValue = '0';
        
        function appendNumber(num) {
            if (currentValue === '0' && num !== '.') {
                currentValue = num;
            } else if (!(currentValue.includes('.') && num === '.')) {
                currentValue += num;
            }
            display.textContent = currentValue;
        }
        
        function appendOperator(op) {
            if (currentValue === '') return;
            currentValue += op;
            display.textContent = currentValue;
        }
        
        function calculate() {
            try {
                currentValue = eval(currentValue).toString();
                display.textContent = currentValue;
            } catch {
                display.textContent = 'Error';
                currentValue = '0';
            }
        }
        
        function clearDisplay() {
            currentValue = '0';
            display.textContent = currentValue;
        }
    </script>
</body>
</html>
<div style="margin-top: 40px; padding: 20px; background: #f9f9f9; border-radius: 10px;">
    <h3>Operaciones Avanzadas</h3>
    <div style="margin-top: 20px;">
        <h4>Animación de Suma</h4>
        <h4>Graficador de Parábolas</h4>
        <label>y = ax² + bx + c</label><br>
        <input type="number" id="a" placeholder="a" value="1" style="padding: 8px; margin: 5px; width: 60px; border-radius: 5px; border: 1px solid #ddd;">
        <input type="number" id="b" placeholder="b" value="0" style="padding: 8px; margin: 5px; width: 60px; border-radius: 5px; border: 1px solid #ddd;">
        <input type="number" id="c" placeholder="c" value="0" style="padding: 8px; margin: 5px; width: 60px; border-radius: 5px; border: 1px solid #ddd;">
        <button onclick="drawParabola()" style="padding: 10px; margin: 5px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">Graficar</button>
        <canvas id="parabolaCanvas" width="300" height="300" style="border: 1px solid #ddd; border-radius: 5px; margin-top: 10px;"></canvas>
    </div>

    <script>
        function drawParabola() {
            const a = parseFloat(document.getElementById('a').value) || 1;
            const b = parseFloat(document.getElementById('b').value) || 0;
            const c = parseFloat(document.getElementById('c').value) || 0;
            const canvas = document.getElementById('parabolaCanvas');
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = 20;
            
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.moveTo(centerX, 0);
            ctx.lineTo(centerX, canvas.height);
            ctx.stroke();
            
            ctx.strokeStyle = '#764ba2';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let px = 0; px < canvas.width; px++) {
                const x = (px - centerX) / scale;
                const y = a * x * x + b * x + c;
                const py = centerY - y * scale;
                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }
    </script>
    <button onclick="appendOperator('**')" style="padding: 10px; margin: 5px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">x^y</button>
    <button onclick="appendFunction('Math.sqrt')" style="padding: 10px; margin: 5px; background: #764ba2; color: white; border: none; border-radius: 5px; cursor: pointer;">√</button>
    
    <div style="margin-top: 20px;">
        <h4>Graficador de Vectores</h4>
        <input type="number" id="vx" placeholder="Componente X" style="padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #ddd;">
        <input type="number" id="vy" placeholder="Componente Y" style="padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #ddd;">
        <button onclick="drawVector()" style="padding: 10px; margin: 5px; background: #90EE90; color: white; border: none; border-radius: 5px; cursor: pointer;">Graficar</button>
        <canvas id="vectorCanvas" width="300" height="300" style="border: 1px solid #ddd; border-radius: 5px; margin-top: 10px;"></canvas>
    </div>
</div>

<script>
    function appendFunction(func) {
        currentValue += func + '(';
        display.textContent = currentValue;
    }
    
    function drawVector() {
        const vx = parseFloat(document.getElementById('vx').value) || 0;
        const vy = parseFloat(document.getElementById('vy').value) || 0;
        const canvas = document.getElementById('vectorCanvas');
        const ctx = canvas.getContext('2d');
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = 20;
        
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, centerY);
        ctx.lineTo(canvas.width, centerY);
        ctx.moveTo(centerX, 0);
        ctx.lineTo(centerX, canvas.height);
        ctx.stroke();
        
        ctx.strokeStyle = '#ff6b6b';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + vx * scale, centerY - vy * scale);
        ctx.stroke();
        
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(centerX + vx * scale - 5, centerY - vy * scale - 5, 10, 10);
    }
</script>
